<section class="auth-shell">
  <div class="auth-glow"></div>

  <article class="auth-card">
    <a class="brand" routerLink="/home" aria-label="Back to home">
      <span class="logo-box">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.8"></circle>
          <path d="M10 9.6L15.2 12L10 14.4V9.6Z" fill="currentColor"></path>
        </svg>
      </span>
      <span class="brand-text">double<span>Play</span></span>
    </a>

    <h1>Reset password</h1>
    <p class="subtitle">Choose a new password and confirm it below</p>

    <form class="auth-form" novalidate (ngSubmit)="onSubmitResetPassword()">
      @if (errorMessage) {
        <p class="form-error">{{ errorMessage }}</p>
      }

      @if (successMessage) {
        <p class="form-success">{{ successMessage }}</p>
      }

      <label class="field-label" for="new-password">New password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M7.5 10V8.5a4.5 4.5 0 1 1 9 0V10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
          <rect x="4" y="10" width="16" height="10" rx="2" stroke="currentColor" stroke-width="1.5"></rect>
        </svg>
        <input
          id="new-password"
          name="newPassword"
          [type]="showNewPassword ? 'text' : 'password'"
          placeholder="Enter a new password"
          [(ngModel)]="newPassword"
        />
        <button
          type="button"
          class="password-toggle"
          (click)="toggleNewPasswordVisibility()"
          [attr.aria-label]="showNewPassword ? 'Hide new password' : 'Show new password'"
        >
          @if (showNewPassword) {
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M3.5 12s3.2-5.5 8.5-5.5S20.5 12 20.5 12 17.3 17.5 12 17.5 3.5 12 3.5 12Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"></path>
              <path d="M10 12a2 2 0 1 1 4 0a2 2 0 1 1-4 0Z" stroke="currentColor" stroke-width="1.5"></path>
              <path d="M4 20L20 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M3.5 12s3.2-5.5 8.5-5.5S20.5 12 20.5 12 17.3 17.5 12 17.5 3.5 12 3.5 12Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"></path>
              <path d="M10 12a2 2 0 1 1 4 0a2 2 0 1 1-4 0Z" stroke="currentColor" stroke-width="1.5"></path>
            </svg>
          }
        </button>
      </div>

      <label class="field-label" for="confirm-password">Confirm new password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M7.5 10V8.5a4.5 4.5 0 1 1 9 0V10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
          <rect x="4" y="10" width="16" height="10" rx="2" stroke="currentColor" stroke-width="1.5"></rect>
        </svg>
        <input
          id="confirm-password"
          name="confirmPassword"
          [type]="showConfirmPassword ? 'text' : 'password'"
          placeholder="Confirm your new password"
          [(ngModel)]="confirmPassword"
        />
        <button
          type="button"
          class="password-toggle"
          (click)="toggleConfirmPasswordVisibility()"
          [attr.aria-label]="showConfirmPassword ? 'Hide confirm password' : 'Show confirm password'"
        >
          @if (showConfirmPassword) {
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M3.5 12s3.2-5.5 8.5-5.5S20.5 12 20.5 12 17.3 17.5 12 17.5 3.5 12 3.5 12Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"></path>
              <path d="M10 12a2 2 0 1 1 4 0a2 2 0 1 1-4 0Z" stroke="currentColor" stroke-width="1.5"></path>
              <path d="M4 20L20 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M3.5 12s3.2-5.5 8.5-5.5S20.5 12 20.5 12 17.3 17.5 12 17.5 3.5 12 3.5 12Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"></path>
              <path d="M10 12a2 2 0 1 1 4 0a2 2 0 1 1-4 0Z" stroke="currentColor" stroke-width="1.5"></path>
            </svg>
          }
        </button>
      </div>

      <button class="submit-btn" type="submit" [disabled]="loading || !!successMessage">
        {{ loading ? 'Saving password...' : 'Reset password' }}
      </button>
    </form>

    @if (successMessage) {
      <p class="switch-line">
        <button type="button" class="login-link" (click)="goToLogin()">Go to sign in</button>
      </p>
    } @else {
      <p class="switch-line">
        Remembered it already? <a routerLink="/login">Back to sign in</a>
      </p>
    }
  </article>

  <p class="legal">Protected by industry-standard encryption</p>
</section>
