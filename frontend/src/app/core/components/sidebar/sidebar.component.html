<header class="mobile-topbar">
  <button
    type="button"
    class="mobile-menu-toggle"
    [class.is-open]="isMobileMenuOpen"
    (click)="toggleMobileMenu()"
    [attr.aria-expanded]="isMobileMenuOpen"
    aria-controls="main-sidebar"
    aria-label="Toggle navigation menu"
  >
    <span class="material-symbols-outlined" aria-hidden="true">{{ isMobileMenuOpen ? 'close' : 'menu' }}</span>
  </button>

  <a class="mobile-brand" routerLink="/home" (click)="closeMobileMenu()">
    <img class="brand-logo" src="/icono_doubleplay.png" alt="doublePlay logo" />
    <span>doublePlay</span>
  </a>
</header>

<div class="mobile-topbar-spacer" aria-hidden="true"></div>

@if (isMobileMenuOpen) {
  <button
    type="button"
    class="mobile-sidebar-backdrop"
    aria-label="Close menu"
    (click)="closeMobileMenu()"
  ></button>
}

<aside class="sidebar" [class.sidebar--open]="isMobileMenuOpen" id="main-sidebar">
  <a class="brand" routerLink="/home">
    <img class="brand-logo" src="/icono_doubleplay.png" alt="doublePlay logo" />
    <span>doublePlay</span>
  </a>

  <nav class="menu">
    @for (item of navItems; track trackByRoute($index, item)) {
      <a
        [routerLink]="item.route"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: item.route === '/home' }"
        [class.menu-link--admin]="item.route === '/admin'"
        class="menu-link"
        (click)="closeMobileMenu()"
      >
        <span class="menu-icon material-symbols-outlined" aria-hidden="true">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="signin-card">
    @if (isLoggedIn) {
      <div class="user-summary">
        <img
          class="user-avatar"
          [src]="currentUserAvatarUrl"
          [alt]="displayName + ' avatar'"
          (error)="handleCurrentUserAvatarError($event)" />
        <div class="user-meta">
          <p class="signin-title">{{ displayName }}</p>
          <p class="signin-text">Signed in</p>
        </div>
      </div>
      <div class="signin-actions">
        <a routerLink="/profile" (click)="closeMobileMenu()">Profile</a>
        <button type="button" (click)="logout()">Logout</button>
      </div>
    } @else {
      <p class="signin-title">Sign in</p>
      <p class="signin-text">Click to login and sync your lists.</p>
      <div class="signin-actions">
        <a routerLink="/login" (click)="closeMobileMenu()">Login</a>
        <a routerLink="/register" (click)="closeMobileMenu()">Register</a>
      </div>
    }
  </div>
</aside>
